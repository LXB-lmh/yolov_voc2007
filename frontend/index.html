<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOLOv8 检测平台</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #ffffff;
        --primary: #2563eb;
        --primary-soft: #dbeafe;
        --text: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
        --danger: #dc2626;
        --ok: #16a34a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 240px);
        color: var(--text);
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      .hero {
        margin-bottom: 16px;
      }
      .hero h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }
      .hero p {
        margin: 0;
        color: var(--muted);
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 6px 24px rgba(15, 23, 42, 0.05);
        padding: 18px;
        margin-top: 14px;
      }
      .label {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 6px;
        display: block;
      }
      .input,
      .file {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        background: #fff;
        font-size: 14px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .tab {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--muted);
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        font-weight: 600;
      }
      .tab.active {
        background: var(--primary-soft);
        color: var(--primary);
        border-color: #bfd5ff;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 12px;
      }
      .btn {
        border: 0;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }
      .btn[disabled] {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .status {
        font-size: 14px;
        color: var(--muted);
        margin-top: 10px;
      }
      .error {
        color: var(--danger);
        margin-top: 10px;
        font-weight: 600;
      }
      .ok {
        color: var(--ok);
        margin-top: 10px;
        font-weight: 600;
      }
      img,
      video {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        margin-top: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
        overflow: hidden;
        border-radius: 10px;
      }
      th,
      td {
        border: 1px solid var(--border);
        padding: 8px;
        font-size: 13px;
      }
      th {
        background: #f8fafc;
        text-align: left;
      }
      .hint {
        color: var(--muted);
        font-size: 13px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app" class="container">
      <div class="hero">
        <h1>YOLOv8 检测平台</h1>
        <p>支持图片检测 + 视频检测（异步任务）</p>
      </div>

      <div class="card">
        <label class="label">后端 API 地址</label>
        <input class="input" v-model="apiBase" />
        <div class="hint">示例：`http://127.0.0.1:8000`</div>
        <div class="tabs">
          <button class="tab" :class="{active: activeTab==='image'}" @click="activeTab='image'">图片检测</button>
          <button class="tab" :class="{active: activeTab==='video'}" @click="activeTab='video'">视频检测</button>
        </div>
      </div>

      <div v-if="activeTab==='image'" class="card">
        <label class="label">上传图片</label>
        <input class="file" type="file" accept="image/*" @change="onImageChange" />
        <div class="row">
          <button class="btn" :disabled="imageLoading || !imageFile" @click="submitImage">开始图片检测</button>
        </div>
        <div v-if="imageLoading" class="status">图片检测中...</div>
        <div v-if="imageError" class="error">{{ imageError }}</div>

        <div v-if="imageResult">
          <div class="ok">图片检测完成</div>
          <img :src="apiBase + imageResult.image_url" alt="检测结果图" />
          <table>
            <thead>
              <tr>
                <th>类别</th>
                <th>置信度</th>
                <th>坐标 (x1,y1,x2,y2)</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="item in imageResult.detections" :key="item.class_id + '-' + item.xyxy.join('-')">
                <td>{{ item.class_name }}</td>
                <td>{{ item.confidence }}</td>
                <td>{{ item.xyxy.join(', ') }}</td>
              </tr>
              <tr v-if="imageResult.detections.length === 0">
                <td colspan="3">未检测到目标</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div v-else class="card">
        <label class="label">上传视频</label>
        <input class="file" type="file" accept="video/*" @change="onVideoChange" />
        <div class="row">
          <button class="btn" :disabled="videoLoading || !videoFile" @click="submitVideo">提交视频任务</button>
        </div>
        <div v-if="videoLoading" class="status">任务已提交，正在后台处理视频...</div>
        <div v-if="videoStatus" class="status">任务状态：{{ videoStatus }}</div>
        <div v-if="videoError" class="error">{{ videoError }}</div>
        <div v-if="videoUrl" class="ok">
          视频检测完成
          <video controls :src="apiBase + videoUrl"></video>
        </div>
        <div class="hint">提示：视频检测耗时较长，建议先上传 10~30 秒短视频测试。</div>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            apiBase: "http://127.0.0.1:8000",
            activeTab: "image",

            imageFile: null,
            imageLoading: false,
            imageError: "",
            imageResult: null,

            videoFile: null,
            videoLoading: false,
            videoError: "",
            videoStatus: "",
            videoTaskId: "",
            videoUrl: "",
            pollTimer: null,
          };
        },
        beforeUnmount() {
          if (this.pollTimer) clearInterval(this.pollTimer);
        },
        methods: {
          onImageChange(e) {
            this.imageFile = e.target.files[0] || null;
            this.imageError = "";
            this.imageResult = null;
          },
          onVideoChange(e) {
            this.videoFile = e.target.files[0] || null;
            this.videoError = "";
            this.videoStatus = "";
            this.videoTaskId = "";
            this.videoUrl = "";
            if (this.pollTimer) clearInterval(this.pollTimer);
          },
          async submitImage() {
            if (!this.imageFile) return;
            this.imageLoading = true;
            this.imageError = "";
            this.imageResult = null;
            try {
              const formData = new FormData();
              formData.append("file", this.imageFile);
              const resp = await fetch(this.apiBase + "/api/detect/image", { method: "POST", body: formData });
              const data = await resp.json();
              if (!resp.ok) throw new Error(data.detail || "图片检测失败");
              this.imageResult = data;
            } catch (err) {
              this.imageError = err.message || "请求异常";
            } finally {
              this.imageLoading = false;
            }
          },
          async submitVideo() {
            if (!this.videoFile) return;
            this.videoLoading = true;
            this.videoError = "";
            this.videoStatus = "queued";
            this.videoUrl = "";
            try {
              const formData = new FormData();
              formData.append("file", this.videoFile);
              const resp = await fetch(this.apiBase + "/api/detect/video", { method: "POST", body: formData });
              const data = await resp.json();
              if (!resp.ok) throw new Error(data.detail || "视频任务提交失败");
              this.videoTaskId = data.task_id;
              this.startPolling();
            } catch (err) {
              this.videoError = err.message || "请求异常";
              this.videoLoading = false;
            }
          },
          startPolling() {
            if (!this.videoTaskId) return;
            if (this.pollTimer) clearInterval(this.pollTimer);
            this.pollTimer = setInterval(async () => {
              try {
                const resp = await fetch(this.apiBase + "/api/tasks/" + this.videoTaskId);
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || "查询任务状态失败");
                this.videoStatus = data.status;
                if (data.status === "completed") {
                  this.videoUrl = data.video_url;
                  this.videoLoading = false;
                  clearInterval(this.pollTimer);
                  this.pollTimer = null;
                } else if (data.status === "failed") {
                  this.videoError = data.error || "视频检测失败";
                  this.videoLoading = false;
                  clearInterval(this.pollTimer);
                  this.pollTimer = null;
                }
              } catch (err) {
                this.videoError = err.message || "轮询失败";
                this.videoLoading = false;
                clearInterval(this.pollTimer);
                this.pollTimer = null;
              }
            }, 2000);
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
